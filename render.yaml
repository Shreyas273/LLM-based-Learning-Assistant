services:
  - type: web
    name: llm-learning-api
    runtime: python
    plan: free
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LLM_PROVIDER
        value: gemini
      - key: SKIP_LOCAL_EMBEDDINGS
        value: "1"
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGINS
        value: https://llm-learning-web.onrender.com,http://localhost:5173

  - type: web
    name: llm-learning-web
    runtime: static
    plan: free
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://llm-learning-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
